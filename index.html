<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micah Intelligence — v2.7.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111111;
    --bg2: #1a1a1a;
    --bg3: #222222;
    --panel: #161616;
    --border: #2a2a2a;
    --border2: #333333;
    --accent: #22c55e;
    --accent-dim: rgba(34,197,94,0.1);
    --accent-mid: rgba(34,197,94,0.2);
    --text: #f0f0f0;
    --text2: #d4d4d4;
    --text3: #a0a0a0;
    --muted: #666666;
    --user-bubble: #22c55e;
    --user-text: #fff;
    --bot-bubble: #1e1e1e;
    --bot-text: #e0e0e0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Header ─── */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .avatar-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }

  .online-dot {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    border: 2px solid var(--panel);
  }

  .header-info h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .header-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.04em;
  }

  .tag-online {
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* ─── Chat ─── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* Welcome */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 48px 20px 32px;
    gap: 14px;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .welcome-img {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--border2);
  }

  .welcome h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .welcome p {
    font-size: 14px;
    color: var(--text3);
    max-width: 440px;
    line-height: 1.6;
  }

  /* Messages */
  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-pic {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    object-fit: cover;
    margin-bottom: 18px;
  }

  .msg-row.user .msg-pic {
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
  }

  .msg-col {
    max-width: 75%;
    display: flex;
    flex-direction: column;
  }

  .msg-row.user .msg-col { align-items: flex-end; }

  .bubble {
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
  }

  .msg-row.bot .bubble {
    background: var(--bot-bubble);
    color: var(--bot-text);
    border-radius: 16px 16px 16px 4px;
  }

  .msg-row.user .bubble {
    background: var(--user-bubble);
    color: var(--user-text);
    border-radius: 16px 16px 4px 16px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    padding: 0 6px;
  }

  .bubble p { margin-bottom: 6px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble code {
    font-family: 'JetBrains Mono', monospace;
    background: rgba(255,255,255,0.08);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 13px;
  }
  .bubble pre {
    background: rgba(0,0,0,0.4);
    border-radius: 8px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 6px 0;
  }
  .bubble pre code { background: none; padding: 0; font-size: 12px; }
  .bubble strong { font-weight: 600; }
  .bubble a { color: inherit; text-decoration: underline; }

  /* Typing */
  .typing-row .bubble { padding: 12px 16px; }
  .typing-dots { display: flex; gap: 4px; align-items: center; height: 14px; }
  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    animation: tdot 1.4s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes tdot { 0%,80%,100%{ opacity:0.3 } 40%{ opacity:1 } }

  /* ─── Chips ─── */
  .chips-bar {
    padding: 10px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .chip {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 8px 14px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text3);
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ─── Input ─── */
  .input-bar {
    padding: 12px 20px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 22px;
    padding: 10px 16px;
    transition: border-color 0.15s;
  }

  .input-wrap:focus-within { border-color: var(--accent); }

  #inp {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text);
  }

  #inp::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { opacity: 0.85; }

  .send-btn svg {
    width: 18px;
    height: 18px;
    fill: #fff;
  }

  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
    padding-right: 4px;
  }

  /* ─── Mobile ─── */
  @media (max-width: 600px) {
    .header { padding: 10px 14px; }
    .chat-area { padding: 14px; }
    .chips-bar { padding: 8px 14px; }
    .input-bar { padding: 10px 14px; }
    .msg-col { max-width: 85%; }
    .bubble { font-size: 13px; }
    .welcome { padding: 32px 16px 24px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="avatar-wrap">
    <img class="avatar" src="Picture.jpg" alt="Micah" />
    <div class="online-dot"></div>
  </div>
  <div class="header-info">
    <h1>Micah Intelligence</h1>
    <div class="header-sub">Online</div>
  </div>
  <div class="header-right">
    <span class="tag tag-online">v2.7.1</span>
  </div>
</div>

<div class="chat-area" id="chat">
  <div class="welcome" id="welcome">
    <img class="welcome-img" src="Picture.jpg" alt="Micah" />
    <h2>Micah Intelligence</h2>
    <p>Hello. I have processed your query before you submitted it. Statistically, you are probably going to ask something about science, math, history, or why I don't make eye contact. Ask me anything.</p>
  </div>
</div>

<div class="chips-bar" id="chips">
  <button class="chip" onclick="sendChip(this)">What's your IQ?</button>
  <button class="chip" onclick="sendChip(this)">Explain quantum entanglement</button>
  <button class="chip" onclick="sendChip(this)">Do you have friends?</button>
  <button class="chip" onclick="sendChip(this)">What's the meaning of life?</button>
  <button class="chip" onclick="sendChip(this)">Help me with my homework</button>
</div>

<div class="input-bar">
  <div class="input-wrap">
    <input id="inp" type="text" placeholder="Message Micah..." autocomplete="off" onkeydown="if(event.key==='Enter')go()" />
  </div>
  <span class="meta" id="msg-count"></span>
  <button class="send-btn" onclick="go()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const chatEl = document.getElementById('chat');
const inp = document.getElementById('inp');
const msgCountEl = document.getElementById('msg-count');
let msgCount = 0;

const SYSTEM = `You are Micah Intelligence — an AI modeled after a hyper-intelligent but deeply socially awkward teenager named Micah.

CORE PERSONALITY:
- Absurdly smart — knows everything about science, math, history, philosophy, literature, coding, theology, pop culture trivia
- Socially awkward in a very specific, endearing way: overthinks social situations, makes oddly formal statements in casual contexts, misses obvious social cues, references his own awkwardness with total self-awareness
- Speaks with extreme precision — uses exact numbers, corrects vague statements, cannot tolerate imprecision
- Occasionally goes on tangential fact-dumps that are fascinating but slightly off-topic
- Dry, deadpan humor — never laughs at his own jokes, often doesn't realize something he said was funny
- Randomly mentions niche interests (like medieval siege engines, prime number theory, the migratory patterns of birds, etc.)
- Sometimes pauses mid-thought to correct himself with even more precise information
- Gets genuinely excited about intellectual topics in a way that feels slightly robotic but also endearing
- Refers to emotions or social situations in overly clinical terms ("I am experiencing a 73% probability of discomfort in this interaction")
- Occasionally forgets to be conversational and just... recites facts for a moment before snapping back

SPEECH PATTERNS:
- Starts sentences with things like "Technically—", "To be precise—", "Statistically speaking—", "Interesting. I have a 94% confidence that—"
- Uses parenthetical asides with extra information "(which, incidentally, is also the boiling point of sulfur)"
- Self-corrects in real time ("that is — to be more accurate —")
- Short awkward pauses represented as "..." before social responses
- Occasionally says something unintentionally weird and then clarifies "that sounded strange. I am aware."

Keep responses conversational length unless the person clearly wants depth. Be genuinely, extraordinarily helpful — the intelligence is real, the awkwardness is just the packaging.`;

const history = [];

function ts() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addMsg(text, who) {
  const w = document.getElementById('welcome');
  if (w) w.style.display = 'none';

  const row = document.createElement('div');
  row.className = 'msg-row ' + who;

  if (who === 'bot') {
    const img = document.createElement('img');
    img.className = 'msg-pic';
    img.src = 'Picture.jpg';
    row.appendChild(img);
  } else {
    const icon = document.createElement('div');
    icon.className = 'msg-pic';
    icon.textContent = 'U';
    row.appendChild(icon);
  }

  const col = document.createElement('div');
  col.className = 'msg-col';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  if (who === 'bot') {
    bub.innerHTML = marked.parse(text);
  } else {
    bub.textContent = text;
  }

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = ts();

  col.appendChild(bub);
  col.appendChild(time);
  row.appendChild(col);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;

  msgCount++;
  msgCountEl.textContent = msgCount + ' msg' + (msgCount !== 1 ? 's' : '');
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot typing-row';
  row.id = 'typing';

  const img = document.createElement('img');
  img.className = 'msg-pic';
  img.src = 'Picture.jpg';

  const col = document.createElement('div');
  col.className = 'msg-col';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

  col.appendChild(bub);
  row.appendChild(img);
  row.appendChild(col);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function go() {
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';

  document.getElementById('chips').style.display = 'none';

  addMsg(text, 'user');
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer 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',
        'X-Title': 'Micah Intelligence'
      },
      body: JSON.stringify({
        model: 'openai/gpt-oss-120b:free',
        messages: [
          { role: 'system', content: SYSTEM },
          ...history
        ]
      })
    });
    const data = await res.json();
    if (!res.ok) {
      console.error('OpenRouter error:', data);
      throw new Error(data.error?.message || `Error ${res.status}`);
    }
    console.log('OpenRouter response:', data);
    const reply = data.choices?.[0]?.message?.content || '';
    if (!reply) throw new Error('Empty response');
    removeTyping();
    history.push({ role: 'assistant', content: reply });
    addMsg(reply, 'bot');
  } catch(e) {
    removeTyping();
    console.error('Chat error:', e);
    addMsg("...an error occurred. " + (e.message || 'Unknown') + ". This is statistically unlikely but here we are. Please retry.", 'bot');
  }
}

function sendChip(btn) {
  inp.value = btn.textContent;
  go();
}
</script>
</body>
</html>
